<style>
  @import url('https://fonts.googleapis.com/css2?family=Capriola&family=Work+Sans:wght@400;600&display=swap');

  .roots-form {
    font-family: 'Work Sans', sans-serif;
    max-width: 560px;
    margin: 0 auto;
  }
  .roots-form h2 {
    font-family: 'Capriola', sans-serif;
    font-size: 1.4rem;
    margin-bottom: 24px;
    color: #333;
  }
  .roots-form .form-row {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }
  .roots-form .form-group {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .roots-form label {
    font-family: 'Work Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: #333;
  }
  .roots-form input[type="text"],
  .roots-form input[type="email"],
  .roots-form input[type="tel"] {
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-family: 'Work Sans', sans-serif;
    font-size: 1rem;
    width: 100%;
    box-sizing: border-box;
  }
  .roots-form input:focus {
    outline: none;
    border-color: #8B6F47;
  }
  .roots-form .checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 20px 0;
  }
  .roots-form .checkbox-group input[type="checkbox"] {
    margin-top: 3px;
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .roots-form .checkbox-group label {
    font-size: 0.82rem;
    font-weight: 400;
    color: #555;
    line-height: 1.4;
  }
  .roots-form button {
    background-color: #C99383;
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-family: 'Work Sans', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    width: 100%;
  }
  .roots-form button:hover {
    background-color: #b5806f;
  }
  .roots-form .success-message {
    display: none;
    padding: 16px;
    background: #f0f7f0;
    border-radius: 4px;
    color: #2d6a2d;
    font-size: 0.95rem;
    text-align: center;
  }
  .roots-form .error-message {
    display: none;
    padding: 16px;
    background: #fdf0f0;
    border-radius: 4px;
    color: #a00;
    font-size: 0.95rem;
    text-align: center;
    margin-top: 12px;
  }
</style>

<div class="roots-form">
  <form id="rentalAnalysisForm">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name <span style="color:red">*</span></label>
        <input type="text" id="firstName" name="firstName" required placeholder="First name">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name <span style="color:red">*</span></label>
        <input type="text" id="lastName" name="lastName" required placeholder="Last name">
      </div>
    </div>
    <div class="form-group" style="margin-bottom: 16px">
      <label for="email">Email <span style="color:red">*</span></label>
      <input type="email" id="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group" style="margin-bottom: 16px">
      <label for="phone">Phone <span style="color:red">*</span></label>
      <input type="tel" id="phone" name="phone" required placeholder="(303) 000-0000">
    </div>
    <div class="form-group" style="margin-bottom: 16px">
      <label for="address">Property Address <span style="color:red">*</span></label>
      <input type="text" id="address" name="address" required placeholder="123 Main St, Denver, CO">
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="smsConsent" name="smsConsent" required>
      <label for="smsConsent">
        I agree to receive text messages from Roots Realty about property management services. Reply STOP to opt out at any time. Message and data rates may apply.
      </label>
    </div>
    <button type="submit">Submit</button>
    <div class="success-message" id="successMsg">
      Thanks! We'll be in touch within one business day.
    </div>
    <div class="error-message" id="errorMsg">
      Something went wrong. Please email us at info@rootsrealtypm.com.
    </div>
  </form>
</div>

<script>
  document.getElementById('rentalAnalysisForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const data = {
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      smsConsent: document.getElementById('smsConsent').checked,
      submittedAt: new Date().toISOString()
    };

    // TODO: replace with Supabase insert or webhook URL when ready
    // For now, log submission and show success
    console.log('Form submission:', data);

    document.getElementById('rentalAnalysisForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
